name: deploy bot

on:
  push:
    branches:
      - main
      - dev

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: gymassistant
        run: |
          python -m pip install --upgrade pip
          # Bot deps (the rest-notifier test imports aiogram) + Mini App deps,
          # plus the test-only tools that no service pins.
          pip install -r requirements.txt -r requirements-miniapp.txt
          pip install pytest==8.3.3 pytest-asyncio==0.24.0 httpx==0.27.2

      - name: Run tests
        working-directory: gymassistant
        run: pytest tests/ -q

  deploy:
    runs-on: ubuntu-latest
    # Never ship a red build: a push to main is a production deploy.
    needs: test

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}

      - name: Determine Tags
        id: tags
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          BASE_TAG=$( [ "${{ github.ref_name }}" = "main" ] && echo "prod" || echo "dev" )
          TAG="${BASE_TAG}-$SHORT_SHA"
          echo "TAG=$TAG" >> $GITHUB_ENV
          echo "BASE_TAG=$BASE_TAG" >> $GITHUB_ENV
          REPO="ghcr.io/${{ github.repository }}"
          echo "REPO=$REPO" >> $GITHUB_ENV

      - name: Build and push BOT
        uses: docker/build-push-action@v5
        with:
          context: gymassistant/
          file: gymassistant/Dockerfile
          push: true
          tags: ${{ env.REPO }}:bot-${{ env.TAG }},${{ env.REPO }}:bot-${{ env.BASE_TAG }}
          cache-from: type=registry,ref=${{ env.REPO }}:bot-buildcache
          cache-to: type=registry,ref=${{ env.REPO }}:bot-buildcache,mode=max

      - name: Build and push PRESS-API
        uses: docker/build-push-action@v5
        with:
          context: gymassistant/
          file: gymassistant/press_api/Dockerfile
          push: true
          tags: ${{ env.REPO }}:api-${{ env.TAG }},${{ env.REPO }}:api-${{ env.BASE_TAG }}
          cache-from: type=registry,ref=${{ env.REPO }}:api-buildcache
          cache-to: type=registry,ref=${{ env.REPO }}:api-buildcache,mode=max

      - name: Build and push MINIAPP
        uses: docker/build-push-action@v5
        with:
          context: gymassistant/
          file: gymassistant/Dockerfile.miniapp
          push: true
          tags: ${{ env.REPO }}:miniapp-${{ env.TAG }},${{ env.REPO }}:miniapp-${{ env.BASE_TAG }}
          cache-from: type=registry,ref=${{ env.REPO }}:miniapp-buildcache
          cache-to: type=registry,ref=${{ env.REPO }}:miniapp-buildcache,mode=max

      - name: Deploy over SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: 2222
          script: |
            set -euo pipefail
            REPO="ghcr.io/${{ github.repository }}"
            TAG=${{ env.TAG }}
            BASE_TAG=${{ env.BASE_TAG }}
            NAMESPACE=$( [ "${{ github.ref_name }}" = "main" ] && echo "gym-prod" || echo "gym-dev" )

            export KUBECONFIG=~/.kube/config
            echo "Deploying to namespace $NAMESPACE"

            # The manifests live in the repo checkout on the server, one directory
            # below home. Without this cd the apply paths resolved to a non-existent
            # location, the apply silently errored, and `set image` shipped a new tag
            # onto a stale (test/dev) spec — half a deploy. cd + set -e makes a missing
            # manifest abort loudly instead.
            cd ~/gymassistant
            # Best-effort refresh so the manifests match the built commit; never fail
            # the deploy if the working copy can't fast-forward.
            git fetch --quiet origin main && git merge --ff-only --quiet origin/main \
              || echo "warning: repo not fast-forwarded; applying on-disk manifests"

            # Apply manifest changes (like sidecars, volumes)
            kubectl apply -f gymassistant/k8s/bot-prod.yaml -n $NAMESPACE
            kubectl apply -f gymassistant/k8s/miniapp-prod.yaml -n $NAMESPACE

            # Deploy Bot with specific tag
            kubectl set image deploy/gym-bot aiogram-bot=$REPO:bot-$TAG -n $NAMESPACE
            # Deploy API with specific tag
            kubectl set image deploy/press-api press-api=$REPO:api-$TAG -n $NAMESPACE
            # Deploy Mini App with specific tag
            kubectl set image deploy/gym-miniapp miniapp=$REPO:miniapp-$TAG -n $NAMESPACE

            kubectl rollout restart deploy/gym-bot -n $NAMESPACE
            kubectl rollout restart deploy/press-api -n $NAMESPACE
            kubectl rollout restart deploy/gym-miniapp -n $NAMESPACE

            kubectl rollout status deploy/gym-bot -n $NAMESPACE
            kubectl rollout status deploy/press-api -n $NAMESPACE
            kubectl rollout status deploy/gym-miniapp -n $NAMESPACE

            echo "Deployment complete!"
