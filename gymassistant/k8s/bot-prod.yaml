apiVersion: apps/v1
kind: Deployment
metadata:
  name: gym-bot
  namespace: gym-prod
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gym-bot
  template:
    metadata:
      labels:
        app: gym-bot
    spec:
      containers:
      - name: aiogram-bot
        imagePullPolicy: IfNotPresent
        image: ghcr.io/sk1bid/gymassistant:bot-prod
        ports:
          - containerPort: 8080
        env:
          - name: TOKEN
            valueFrom: { secretKeyRef: { name: bot-secrets, key: TOKEN } }
          - name: WEBHOOK_HOST
            valueFrom: { secretKeyRef: { name: bot-secrets, key: WEBHOOK_HOST } }
          - name: WEBHOOK_PATH
            valueFrom: { secretKeyRef: { name: bot-secrets, key: WEBHOOK_PATH } }
          - name: WEBHOOK_SECRET
            valueFrom: { secretKeyRef: { name: bot-secrets, key: WEBHOOK_SECRET } }
          - name: POSTGRES_USER
            valueFrom: { secretKeyRef: { name: bot-secrets, key: POSTGRES_USER } }
          - name: POSTGRES_PASSWORD
            valueFrom: { secretKeyRef: { name: bot-secrets, key: POSTGRES_PASSWORD } }
          - name: POSTGRES_DB
            valueFrom: { secretKeyRef: { name: bot-secrets, key: POSTGRES_DB } }
          - name: DB_HOST
            value: "postgres"
          - name: DB_PORT
            value: "5432"
          - name: PORT
            valueFrom: { secretKeyRef: { name: bot-secrets, key: PORT } }
          - name: DB_URL
            valueFrom: { secretKeyRef: { name: bot-secrets, key: DB_URL } }
          - name: NEIRO_API_URL
            value: "http://press-api.gym-prod.svc.cluster.local:8000/predict"
          - name: ADMIN_IDS
            valueFrom: { secretKeyRef: { name: bot-secrets, key: ADMIN_IDS } }
          - name: PROXY_URL
            value: "socks5://127.0.0.1:1080"
          # Webhook не поднять: провайдер режет подсети Telegram в обе стороны,
          # входящий вызов от api.telegram.org до нас не доходит.
          - name: USE_POLLING
            value: "true"
          # Куда ведёт кнопка меню бота. Саму страницу телефон грузит с sk1bid.ru
          # напрямую — блокировка Telegram на Mini App не распространяется.
          - name: MINIAPP_URL
            value: "https://sk1bid.ru/gym/"
      - name: ss-client
        imagePullPolicy: IfNotPresent
        image: shadowsocks/shadowsocks-libev:latest
        command: ["ss-local"]
        args: ["-c", "/etc/shadowsocks/config.json"]
        volumeMounts:
        - name: ss-config-volume
          mountPath: /etc/shadowsocks
          readOnly: true
      imagePullSecrets:
        - name: ghcr-auth
      volumes:
      - name: ss-config-volume
        secret:
          secretName: ss-bot-config
---
apiVersion: v1
kind: Service
metadata:
  name: gym-bot
  namespace: gym-prod
spec:
  selector:
    app: gym-bot
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30080
  type: NodePort
---
# Секрет ss-bot-config здесь СОЗНАТЕЛЬНО отсутствует.
#
# Раньше он лежал прямо в этом файле в stringData — с адресом сервера и паролем
# Shadowsocks открытым текстом, в публичном гите. Создавайте его из окружения:
#
#   kubectl -n gym-prod create secret generic ss-bot-config \
#     --from-file=config.json=./ss-config.json
#
# где ss-config.json не коммитится (см. .gitignore). Шаблон — в k8s/ss-config.example.json.
#
# ВАЖНО: старый пароль остался в истории гита, поэтому он скомпрометирован —
# его нужно сменить на сервере Shadowsocks, а не просто убрать отсюда.
